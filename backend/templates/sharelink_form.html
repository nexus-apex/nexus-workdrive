{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} ShareLink | NexusWorkDrive{% endblock %}
{% block page_title %}{% if editing %}Edit ShareLink{% else %}New ShareLink{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>File Name</label>
        <input type="text" name="file_name" value="{{ record.file_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Shared By</label>
        <input type="text" name="shared_by" value="{{ record.shared_by|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Shared With</label>
        <input type="text" name="shared_with" value="{{ record.shared_with|default:'' }}">
      </div>
      <div class="form-group">
        <label>Permission</label>
        <select name="permission">
          <option value="view" {% if record.permission == 'view' %}selected{% endif %}>View</option>
          <option value="edit" {% if record.permission == 'edit' %}selected{% endif %}>Edit</option>
          <option value="download" {% if record.permission == 'download' %}selected{% endif %}>Download</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Expires</label>
        <input type="date" name="expires" value="{{ record.expires|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Access Count</label>
        <input type="number" name="access_count" value="{{ record.access_count|default:'0' }}">
      </div>
    </div>
    <div class="form-group">
      <div class="checkbox-wrapper">
        <input type="checkbox" name="active" id="id_active" {% if record.active %}checked{% endif %}>
        <label for="id_active" style="margin-bottom:0">Active</label>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} ShareLink</button>
      <a href="/sharelinks/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
