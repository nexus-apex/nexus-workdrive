<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%228%22 fill=%22#06b6d4%22/><text x=%2216%22 y=%2223%22 font-size=%2220%22 text-anchor=%22middle%22 fill=%22white%22 font-weight=%22bold%22 font-family=%22sans-serif%22>N</text></svg>">
<title>{% block title %}NexusWorkDrive{% endblock %}</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#06b6d4;--primary-dark:#0891b2;--bg:#0f0f1a;--sidebar:#12121f;--card:#1a1a2e;--text:#e2e8f0;--muted:#94a3b8;--border:#2d2d4e;--green:#10b981;--red:#ef4444;--yellow:#f59e0b}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;min-height:100vh}
a{color:var(--primary);text-decoration:none}
.sidebar{width:250px;background:var(--sidebar);border-right:1px solid var(--border);padding:1.5rem 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-brand{padding:0 1.5rem 1.5rem;border-bottom:1px solid var(--border);margin-bottom:1rem}
.sidebar-brand h1{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,var(--primary),#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sidebar-brand p{font-size:0.7rem;color:var(--muted);margin-top:0.25rem}
.nav{flex:1;padding:0 0.75rem;overflow-y:auto}
.nav a{display:flex;align-items:center;gap:0.75rem;padding:0.65rem 1rem;border-radius:10px;color:var(--muted);font-size:0.9rem;font-weight:500;transition:all 0.2s;margin-bottom:0.25rem}
.nav a:hover,.nav a.active{background:rgba(99,102,241,0.1);color:var(--text)}
.nav a.active{background:var(--primary);color:white}
.nav-icon{width:20px;height:20px;opacity:0.7;flex-shrink:0}
.sidebar-footer{padding:1rem 1.5rem;border-top:1px solid var(--border)}
.sidebar-footer a{color:var(--muted);font-size:0.85rem}
.main{margin-left:250px;flex:1;padding:2rem;min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}
.topbar h2{font-size:1.5rem;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:1rem}
.user-badge{display:flex;align-items:center;gap:0.5rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.5rem 1rem;font-size:0.85rem}
.user-avatar{width:32px;height:32px;border-radius:8px;background:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;color:white}
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.6rem 1.25rem;border-radius:10px;font-size:0.85rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.btn-primary{background:var(--primary);color:white}.btn-primary:hover{opacity:0.9}
.btn-danger{background:var(--red);color:white}.btn-danger:hover{opacity:0.9}
.btn-sm{padding:0.4rem 0.8rem;font-size:0.8rem}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.25rem}
.stat-label{font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem}
.stat-value{font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--primary),#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:0.75rem 1rem;font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:0.75rem 1rem;border-bottom:1px solid var(--border);font-size:0.9rem}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-block;padding:0.2rem 0.6rem;border-radius:6px;font-size:0.75rem;font-weight:600}
.badge-green{background:rgba(16,185,129,0.15);color:#10b981}
.badge-yellow{background:rgba(245,158,11,0.15);color:#f59e0b}
.badge-red{background:rgba(239,68,68,0.15);color:#ef4444}
.badge-blue{background:rgba(59,130,246,0.15);color:#3b82f6}
.badge-purple{background:rgba(139,92,246,0.15);color:#8b5cf6}
.form-group{margin-bottom:1.25rem}
.form-group label{display:block;font-size:0.85rem;color:var(--muted);margin-bottom:0.4rem;font-weight:500}
.form-group input,.form-group textarea,.form-group select{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:0.7rem 1rem;color:var(--text);font-size:0.9rem;outline:none;transition:border 0.2s}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{border-color:var(--primary)}
.form-group textarea{min-height:80px;resize:vertical}
.form-group select{appearance:none;cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.actions{display:flex;gap:0.5rem}
.empty{text-align:center;padding:3rem;color:var(--muted)}
.search-bar{display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:10px;padding:0.6rem 1rem;color:var(--text);font-size:0.9rem;outline:none}
.search-bar input:focus{border-color:var(--primary)}
.search-bar select{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0.6rem 1rem;color:var(--text);font-size:0.9rem;outline:none;min-width:140px}
.checkbox-wrapper{display:flex;align-items:center;gap:0.5rem;padding:0.7rem 0}
.checkbox-wrapper input[type=checkbox]{width:20px;height:20px;accent-color:var(--primary)}
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .form-row{grid-template-columns:1fr}
}
</style>
</head>
<body>
<aside class="sidebar">
  <div class="sidebar-brand">
    <h1>NexusWorkDrive</h1>
    <p>Cloud File Storage</p>
  </div>
  <nav class="nav">
    <a href="/dashboard/" class="{% if request.path == '/dashboard/' %}active{% endif %}">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/folders/" class="{% if '/folders' in request.path %}active{% endif %}">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      Folders
    </a>
    <a href="/storedfiles/" class="{% if '/storedfiles' in request.path %}active{% endif %}">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      Storedfiles
    </a>
    <a href="/sharelinks/" class="{% if '/sharelinks' in request.path %}active{% endif %}">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Sharelinks
    </a>
    <a href="/settings/" class="{% if request.path == '/settings/' %}active{% endif %}">
      <svg class="nav-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Settings
    </a>
  </nav>
  <div class="sidebar-footer">
    <a href="/logout/">Logout</a>
  </div>
</aside>
<main class="main">
  <div class="topbar">
    <h2>{% block page_title %}Dashboard{% endblock %}</h2>
    <div class="topbar-right">
      <div class="user-badge">
        <div class="user-avatar">{{ request.user.username|first|upper }}</div>
        <span>{{ request.user.username }}</span>
      </div>
    </div>
  </div>
  {% block content %}{% endblock %}
</main>
</body>
</html>
