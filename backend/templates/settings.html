{% extends "base.html" %}
{% block title %}Settings | NexusWorkDrive{% endblock %}
{% block page_title %}Settings{% endblock %}
{% block content %}
<div class="card" style="max-width:600px">
  <h3 style="margin-bottom:1.5rem">Application Info</h3>
  <div class="form-group">
    <label>Application</label>
    <input type="text" value="NexusWorkDrive" disabled>
  </div>
  <div class="form-group">
    <label>Version</label>
    <input type="text" value="2.0.0 (Enterprise)" disabled>
  </div>
  <div class="form-group">
    <label>Environment</label>
    <input type="text" value="Production" disabled>
  </div>
  <div class="form-group">
    <label>Logged in as</label>
    <input type="text" value="{{ request.user.username }}" disabled>
  </div>
  <div style="margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--border)">
    <h3 style="margin-bottom:1rem">Quick Links</h3>
    <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
      <a href="/admin/" class="btn btn-primary btn-sm" target="_blank">Django Admin</a>
      <a href="/api/stats/" class="btn btn-sm" style="background:var(--border);color:var(--text)">API Stats</a>
      <a href="/logout/" class="btn btn-danger btn-sm">Logout</a>
    </div>
  </div>
</div>
{% endblock %}
