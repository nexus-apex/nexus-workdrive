name: Deploy to Coolify
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Webhook
        run: |
          curl -fsSL -X POST "${{ secrets.COOLIFY_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            --retry 3 --retry-delay 5
          echo "Deploy triggered successfully"
